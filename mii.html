<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test for Mii Thangapulla 🩵😚🌀</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(-45deg,#0a3d62,#1e90ff,#0c7bdc,#0a3d62);
background-size:400% 400%;
animation:oceanMove 15s ease infinite;
overflow:hidden;
}

@keyframes oceanMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
font-size:38px;
color:#aee6ff;
text-shadow:0 0 5px #00d9ff,0 0 10px #00d9ff,0 0 20px #1e90ff;
}

.container{
background:rgba(0,0,0,0.55);
padding:35px;
margin-top:60px;
border-radius:20px;
width:85%;
margin-left:auto;
margin-right:auto;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#1e90ff;
color:white;
}

button:hover{
background:#00bfff;
transform:scale(1.08);
transition:0.3s;
}

.option{
display:block;
margin:10px auto;
width:260px;
}

.correct{font-size:26px;color:#8affc1;}
.wrong{font-size:24px;color:#ff9e9e;}

/* floating hearts */

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

/* intro screens */

.screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#0a3d62,#1e90ff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

</style>
</head>

<body>

<!-- WARNING SCREEN -->

<div class="screen" id="warning">

<h1>⚠️ WARNING ⚠️</h1>

<p>This test is only for</p>

<h2>Thangapulla 🩵😚</h2>

<p>If you are not him…</p>

<p>Please close this page 😏</p>

<button onclick="nextScreen()">Continue</button>

</div>

<!-- INTRO SCREEN -->

<div class="screen" id="intro" style="display:none">

<h1>🩵</h1>
<h2>Hey Thangapulla 😚</h2>
<p>I made something for you...</p>
<p>Tap to start the surprise 🌊</p>

<button onclick="enter()">Start Surprise</button>

</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8a7e4b1c4b.mp3">
</audio>

<div class="container" id="app">

<h1>Test for Mii Thangapulla 🩵😚🌀</h1>

<p>Join video call first... I want to see your reaction 😚</p>

<a href="meet.google.com/zat-tpou-rej" target="_blank">
<button>Join Google Meet 📹</button>
</a>

<br>

<button onclick="start()">Start Test 🩵</button>

</div>

<script>

/* intro screens */

function nextScreen(){
document.getElementById("warning").style.display="none"
document.getElementById("intro").style.display="flex"
}

function enter(){
document.getElementById("intro").style.display="none"
}

/* floating hearts */

setInterval(()=>{
let heart=document.createElement("div")
heart.className="heart"
heart.style.left=Math.random()*100+"%"
heart.innerHTML="🩵"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),8000)
},600)

/* questions */

let q=0
let score=0

const questions=[

{q:"Our First outing together?",
options:["09/2/2025","10/2/2025","01/1/2025"],
ans:"09/2/2025"},

{q:"When I slap you first time?",
options:["4/11/2024","5/11/2024","1/11/2024"],
ans:"4/11/2024"},

{q:"When you gave me chocolate first time?",
options:["7/2/2025","6/2/2025","10/2/2025"],
ans:"7/2/2025"},

{q:"Which day you put WhatsApp status for me?",
options:["13/4/2025","15/4/2025","10/4/2025"],
ans:"13/4/2025"},

{q:"Our first long travel together?",
options:["3/2/2026","1/2/2026","5/2/2026"],
ans:"3/2/2026"},

{q:"Which name you call me?",
options:["Kutty Ponnu","Baby","Dear"],
ans:"Kutty Ponnu"},

{q:"Which word you always use with me?",
options:["Unmatured Grl","Drama Queen","Angry Girl"],
ans:"Unmatured Grl"},

{q:"While fighting which word you use?",
options:["Love you ma","Leave me","Stop talking"],
ans:"Love you ma"},

{q:"Max we talk for which problem?",
options:["Not talk to me","Money","Food"],
ans:"Not talk to me"},

{q:"Special message we use often?",
options:["11:11","12:12","10:10"],
ans:"11:11"}

]

function start(){next()}

function next(){

if(q>=questions.length){result();return}

let question=questions[q]
let html=`<h2>${question.q}</h2>`

question.options.forEach(o=>{
html+=`<button class="option" onclick="check('${o}')">${o}</button>`
})

document.getElementById("app").innerHTML=html
}

function check(a){

let question=questions[q]

if(a===question.ans){

score++

document.getElementById("app").innerHTML=
`<div class="correct">Correct 🩵😚</div>
<button onclick="go()">Next</button>`

}else{

document.getElementById("app").innerHTML=
`<div class="wrong">

Wrong answer 😏  
Punishment time!

<br><br>

Take screenshot and send SMS proof 📷

<br><br>

<input type="file" accept="image/*" capture="camera">

<br><br>

<button onclick="go()">Next</button>

</div>`
}

}

function go(){q++;next()}

/* result */

function result(){

let message=""

if(score==10){message="I love you lotzz Thangapulla 🩵😚🌀"}
else if(score>=6){message="Good Thangapulla 😒🩵"}
else{message="I hate U lotzz Chlm 😏💔"}

document.getElementById("app").innerHTML=`

<h1>${message}</h1>
<h2>You got ${score}/10 correct</h2>

<h2>Birthday Countdown 🎂</h2>
<h1 id="countdown"></h1>

<p>நாம் சின்ன சின்ன விஷயத்துக்கு சண்டை போடுறோம்...</p>
<p>ஆனா சில நிமிஷத்துல மறந்து மீண்டும் பேச ஆரம்பிக்கிறோம்.</p>
<p>நீ என்னை அழ வைப்பதும் நீ தான்... ஆனா கஷ்ட நேரத்தில் என் பக்கம் நிற்பதும் நீ தான்.</p>

<h2>உன் சிரிப்பு எப்போதும் இருக்கணும் 🩵😚</h2>

<h2>I’m Proud Of You</h2>
<p>You passed all your subjects. I'm really proud of you.</p>

<h1>Happy Birthday in Advance 🎂</h1>

`

var birthday=new Date("July 18, 2026 00:00:00").getTime()

setInterval(function(){

var now=new Date().getTime()
var distance=birthday-now

var days=Math.floor(distance/(1000*60*60*24))
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
var minutes=Math.floor((distance%(1000*60*60))/(1000*60))
var seconds=Math.floor((distance%(1000*60))/1000)

document.getElementById("countdown").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s"

},1000)

}

</script>

</body>
</html>
